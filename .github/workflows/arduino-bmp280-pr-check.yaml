name: 🧪 Arduino BMP280 - PR check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read

jobs:
  acceptance_tests:
    name: ✅ Build and Run Acceptance tests
    if: |
      !github.event.repository.is_template &&
      startsWith(github.head_ref, 'arduino/') && endsWith(github.head_ref, '/bmp280')
    runs-on: self-hosted
    steps:
      - name: 🛡️ Get GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.THEALBERTDEVBOT_APP_ID }}
          private-key: ${{ secrets.THEALBERTDEVBOT_SECRET_KEY }}
          owner: ${{ github.repository_owner }}

      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: 🔍 Extract student username from branch name
        run: |
          echo "STUDENT_USERNAME=$(echo '${{ github.head_ref }}' | cut -d'/' -f2)" >> $GITHUB_ENV

      - name: 🏗️ Build and upload PlatformIO CLI project
        run: |
          cd ${{ github.workspace }}/arduino/workspace/${{ env.STUDENT_USERNAME }}/bmp280
          pio run --target upload

      - name: 🧬 Run acceptance tests
        id: acceptance-tests
        run: |
          TEST_DIR=${{ github.workspace }}/.github/tests/acceptance/test_bmp280
          CACHE_KEY=$(md5sum "$TEST_DIR/requirements.txt" | cut -d' ' -f1)
          VENV_CACHE_DIR="/opt/actions-cache/venv/$CACHE_KEY"

          if [ -d "$VENV_CACHE_DIR" ]; then
            echo "Cache hit: $CACHE_KEY"
          else
            echo "Cache miss: $CACHE_KEY — creating new .venv"
            mkdir -p "$VENV_CACHE_DIR"
            /usr/bin/python3 -m venv "$VENV_CACHE_DIR"
            source "$VENV_CACHE_DIR/bin/activate"
            pip install -r "$TEST_DIR/requirements.txt"
          fi

          source "$VENV_CACHE_DIR/bin/activate"
          cd "$TEST_DIR"
          python -m pytest -v
